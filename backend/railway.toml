[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile.merged"

[deploy]
# The merged image runs Caddy + OWI + backend via the Dockerfile CMD
# (start-merged.sh), so do NOT set a startCommand (it would replace the CMD and
# only launch the backend). Caddy routes the healthcheck to the backend; /docs -> 200.
healthcheckPath = "/docs"
# Generous timeout: the container also boots OWI (loads an embedding model) and the
# backend waits for OWI to create webui.db on the shared volume before it serves.
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
