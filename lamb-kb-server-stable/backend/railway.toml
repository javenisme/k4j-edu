[build]
builder = "DOCKERFILE"
dockerfilePath = "lamb-kb-server-stable/backend/Dockerfile"

[deploy]
# Wrap in `sh -c` so $PORT is shell-expanded — Railway execs the start command
# directly (no shell), so a bare `--port $PORT` passes the literal string "$PORT".
startCommand = "sh -c \"uvicorn main:app --host 0.0.0.0 --port $PORT --forwarded-allow-ips '*'\""
# KB server has no "/" route; /docs returns 200 and needs no auth.
healthcheckPath = "/docs"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
